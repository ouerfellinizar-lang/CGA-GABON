}

const FAMREF={
  CFS65:{ml:42},NOVA_B:{ml:35},NOVA_C:{ml:38},THAOS_B:{ml:33},
  THAOS_C:{ml:36},ECW50:{ml:55},PERGOLA:{ml:90},
  PORTAIL_B:{ml:65},PORTAIL_C:{ml:70},BALU_12481:{ml:45}
}

function coeff(){return S.params.taux_euro*(1+S.params.fret)*(1+S.params.douane)*(1+S.params.transit)}

function calcF(f){
  const c=coeff()
  const perim=2*(f.largeur+f.hauteur)/1000
  const ml=(FAMREF[f.famille]||{ml:40}).ml
  const matEUR=ml*perim*f.qty
  const matFCFA=Math.round(matEUR*c)
  const htFCFA=Math.round(matFCFA*S.params.coeff_vente)
  const tva=Math.round(htFCFA*S.params.tva)
  return{matFCFA,htFCFA,tva,ttc:htFCFA+tva}
}

function fcfa(n){return Math.round(n).toLocaleString('fr-FR')+' FCFA'}

function pDevis(root){
  if(!S.projet){set({page:'projets'});return}
  const totals=S.fenetres.reduce((a,f)=>{
    const c=calcF(f);return{ht:a.ht+c.htFCFA,tva:a.tva+c.tva,ttc:a.ttc+c.ttc}
  },{ht:0,tva:0,ttc:0})
  const transport=S.params.transport||0
  const baseHT=totals.ht+transport
  const tvaTotal=Math.round(baseHT*S.params.tva)
  const ttc=baseHT+tvaTotal

  root.innerHTML=`

  <main class="p-4 space-y-4 pb-28 fade-in">
    <div class="flex items-center gap-3">

      <p class="text-sm text-slate-500">${S.projet?.nom}</p></div>
    </div>

    <!-- Aperçu devis -->

          <div class="text-xs text-slate-500 mt-1">${S.params.societe_adresse||'Libreville, Gabon'}</div>
          ${S.params.societe_tel?`<div class="text-xs text-slate-500">${S.params.societe_tel}</div>`:''}

          <div class="font-bold text-brand-900">DEVIS</div>

        </div>
      </div>

      <div class="bg-slate-50 rounded-xl p-3">

        <div class="font-semibold text-brand-900">${S.projet?.client||'—'}</div>
        <div class="text-sm text-slate-500">${S.projet?.chantier||''}</div>

              <div class="text-xs text-slate-400">${fcfa(pu)}/u</div>
              <div class="font-bold">${fcfa(c.htFCFA)}</div>
            </div>
          </div>`
        }).join('')}
        ${transport>0?`<div class="flex justify-between text-sm py-2 border-b border-slate-50">
          <span class="text-slate-600">Transport</span><span class="font-bold">${fcfa(transport)}</span></div>`:''}

        <div class="flex justify-between text-sm text-slate-600">

// ── BC FOURNISSEUR PAGE ───────────────────────────────────────────────────────
function pBC(root){
  if(!S.projet){set({page:'projets'});return}

  // Consolider les profilés et accessoires
  const profMap={}
  const accRef={
    CFS65:['19446','19451','19452','57415','13543'],
    NOVA_B:['19379','19380','19112','19111'],
    NOVA_C:['19106','19107','19110','19121','19112'],
    THAOS_B:['19212','19214','19215','19213'],
    THAOS_C:['19097','19101','19102','19103'],
    ECW50:['10901','10940','10980','10981'],
    PERGOLA:['22008','19281','19282','19249','19313','19314'],
    PORTAIL_B:['19193','19196','19205','19198'],
    PORTAIL_C:['19194','19195','11885','19200'],
    BALU_12481:['12481']
  }

  S.fenetres.forEach(f=>{
    const perim=2*(f.largeur+f.hauteur)/1000
    const refs=accRef[f.famille]||[]
    refs.forEach(ref=>{
      const prixML=PP[ref]?.b||0
      const ml=perim*f.qty
      if(!profMap[ref])profMap[ref]={ref,ml:0,prixML,total:0}
      profMap[ref].ml+=ml
      profMap[ref].total+=ml*prixML
    })
  })

  const profils=Object.values(profMap).map(p=>({
    ...p,
    ml:+p.ml.toFixed(2),
    barres:Math.ceil(p.ml/6),
    total:+p.total.toFixed(2)
  }))

  const totalEUR=profils.reduce((s,p)=>s+p.total,0)
  const coeff_import=coeff()
  const totalFCFA=Math.round(totalEUR*coeff_import)

  root.innerHTML=`
  ${topbar()}
  <main class="p-4 space-y-4 pb-28 fade-in">
    <div class="flex items-center gap-3">
      <button onclick="set({page:'projet'})" class="w-9 h-9 rounded-xl bg-white shadow flex items-center justify-center text-lg font-bold">‹</button>
      <div><h1 class="text-xl font-black text-brand-900">Bon de commande</h1>
      <p class="text-sm text-slate-500">KAYE / Exlabesa · ${S.projet?.nom}</p></div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
      <div class="px-4 py-3" style="background:#1E8449">
        <h2 class="font-bold text-white text-sm">📦 Profilés consolidés (${profils.length} références)</h2>
      </div>
      <div class="divide-y divide-slate-50">
        ${profils.map(p=>`
        <div class="flex items-center gap-3 px-4 py-3">
          <div class="flex-1 min-w-0">
            <div class="font-bold text-sm" style="color:#2E5FA3">EXL-${p.ref}</div>
            <div class="text-xs text-slate-400">${p.ml.toFixed(2)} ml net · ${p.barres} barre${p.barres>1?'s':''} 6m</div>
          </div>
          <div class="text-right flex-shrink-0">
            <div class="text-xs text-slate-400">${p.prixML.toFixed(3)} €/ml</div>
            <div class="font-bold text-sm text-brand-900">${p.total.toFixed(2)} €</div>
          </div>
        </div>`).join('')}
      </div>
    </div>

    <div class="bg-brand-900 rounded-2xl p-5 text-white">
      <div class="text-xs opacity-60 mb-1">TOTAL ACHAT HT (profilés)</div>
      <div class="text-2xl font-black" style="color:#F59E0B">${totalEUR.toFixed(2)} €</div>
      <div class="text-sm opacity-70 mt-1">≈ ${fcfa(totalFCFA)} arrivée Libreville</div>
      <div class="mt-3 pt-3 border-t border-white/20 text-xs opacity-60">
        KAYE Aluminium Tanger · EXW/FOB Tanger · Alliage 6060/6063 T5
      </div>
    </div>

    <button onclick="printBC()" class="w-full py-4 text-white font-bold rounded-2xl flex items-center justify-center gap-2 shadow" style="background:#D97706">
      🖨️ Imprimer / Sauvegarder PDF
    </button>
  </main>
  ${botnav('projets')}`
}

}

    <div class="w-full max-w-sm">
      <div class="text-center mb-10">

async function doLogin(){
  const e=document.getElementById('lem').value
  const p=document.getElementById('lpw').value
  const btn=document.getElementById('lbtn')
  const err=document.getElementById('lerr')
  btn.textContent='Connexion…';btn.disabled=true
  const{error}=await sb.auth.signInWithPassword({email:e,password:p})
  if(error){
    err.textContent='Email ou mot de passe incorrect'
    err.classList.remove('hidden')
    btn.textContent='Se connecter';btn.disabled=false
  }
}

        <button onclick="toggleNewProjet()" class="flex-1 py-2.5 border border-slate-200 rounded-xl text-sm font-semibold text-slate-600">Annuler</button>
        <button onclick="saveNewProjet()" class="flex-1 py-2.5 bg-brand-900 text-white rounded-xl text-sm font-bold">Créer</button>
      </div>
    </div>

    ${S.projets.length===0?`
      <div class="text-center py-16">
        <div class="text-5xl mb-3">📁</div>
        <p class="font-semibold text-slate-500">Aucun projet</p>
        <p class="text-sm text-slate-400 mt-1">Créez votre premier projet</p>
      </div>`
    :S.projets.map(p=>`
      <div onclick="openProjet('${p.id}')" class="bg-white rounded-2xl shadow-sm p-4 flex items-center gap-3 cursor-pointer hover:shadow-md transition">
        <div class="w-10 h-10 rounded-xl bg-brand-100 flex items-center justify-center text-xl flex-shrink-0">📋</div>
        <div class="flex-1 min-w-0">
          <div class="font-bold text-brand-900 truncate">${p.nom}</div>
          <div class="text-xs text-slate-500">${p.client||''} ${p.date_devis?'· '+new Date(p.date_devis).toLocaleDateString('fr-FR'):''}</div>
          <span class="text-xs px-2 py-0.5 rounded-full bg-slate-100 text-slate-600 font-semibold">${p.statut}</span>
        </div>
        <button onclick="delProjet(event,'${p.id}')" class="p-2 text-slate-300 hover:text-red-400 rounded-lg">🗑</button>
      </div>`).join('')}
  </main>
  ${botnav('projets')}`
}

function toggleNewProjet(){
  const f=document.getElementById('npform')
  f.classList.toggle('hidden')
}

async function saveNewProjet(){
  const nom=document.getElementById('npnom').value.trim()
  if(!nom){toast('Nom requis','err');return}
  const dateVal=document.getElementById('npdat').value
  const payload={
    nom,user_id:S.user.id,
    client:document.getElementById('npcli').value||null,
    chantier:document.getElementById('npcha').value||null,
    statut:'brouillon'
  }
  if(dateVal&&dateVal.match(/^\d{4}-\d{2}-\d{2}$/))payload.date_devis=dateVal
  try{
    const{data,error}=await sb.from('projets').insert(payload).select().single()
    if(error){toast('Erreur: '+error.message,'err');console.error(error);return}
    toast('Projet créé !')
    S.projet=data
    await loadFenetres(data.id)
    set({page:'projet',showForm:false,editF:null})
  }catch(e){toast('Erreur réseau','err');console.error(e)}
}

async function openProjet(id){
  S.projet=S.projets.find(p=>p.id===id)
  await loadFenetres(id)
  set({page:'projet',showForm:false,editF:null,expanded:{}})
}

async function delProjet(e,id){
  e.stopPropagation()
  if(!confirm('Supprimer ce projet ?'))return
  await sb.from('projets').delete().eq('id',id)
  toast('Projet supprimé')
  loadProjets()
}

let _selFin='blanc'
function openFenetreForm(fid){
  if(fid){
    const f=S.fenetres.find(x=>x.id===fid)
    _selFin=f.finition||'blanc'
    set({showForm:true,editF:{...f}})
  }else{
    _selFin='blanc'
    set({showForm:true,editF:{famille:'CFS65',config:'DB01',largeur:1500,hauteur:2100,qty:1,finition:'blanc',repere:''}})
  }
}

function changeFam(val){
  _selFin=_selFin||'blanc'
  const famObj=FAM.find(f=>f.k===val)||FAM[0]
  set({editF:{...S.editF,famille:val,config:famObj.cfg[0]||''}})
}

function selectFin(k){
  _selFin=k
  document.querySelectorAll('.fin-btn').forEach(b=>{
    const active=b.dataset.fin===k
    b.className=b.className.replace(/bg-brand-900 text-white border-brand-900|bg-white text-slate-600 border-slate-200/,'')
    b.className+=' '+(active?'bg-brand-900 text-white border-brand-900':'bg-white text-slate-600 border-slate-200')
  })
}

async function saveFenetre(){
  const data={
    projet_id:S.projet.id,
    repere:document.getElementById('frep').value,
    famille:document.getElementById('ffam').value,
    config:document.getElementById('fcfg').value||null,
    largeur:+document.getElementById('flar').value,
    hauteur:+document.getElementById('fhau').value,
    qty:+document.getElementById('fqty').value,
    finition:_selFin,
    position:S.editF?.id?S.editF.position:S.fenetres.length
  }
  if(S.editF?.id){
    await sb.from('fenetres').update(data).eq('id',S.editF.id)
    toast('Fenêtre mise à jour !')
  }else{
    await sb.from('fenetres').insert(data)
    toast('Fenêtre ajoutée !')
  }
  await loadFenetres(S.projet.id)
  set({showForm:false,editF:null})
}

async function delFenetre(id){
  if(!confirm('Supprimer cette fenêtre ?'))return
  await sb.from('fenetres').delete().eq('id',id)
  toast('Supprimée')
  await loadFenetres(S.projet.id)
  draw()
}

function pChiffrage(root){
  const totals=S.fenetres.reduce((a,f)=>{
    const c=calcF(f);return{mat:a.mat+c.matFCFA,ht:a.ht+c.htFCFA,tva:a.tva+c.tva,ttc:a.ttc+c.ttc}
  },{mat:0,ht:0,tva:0,ttc:0})

  root.innerHTML=`
  ${topbar()}
  <main class="p-4 space-y-4 pb-28 fade-in">
    <div class="flex items-center gap-3">
      <button onclick="set({page:'projet'})" class="w-9 h-9 rounded-xl bg-white shadow flex items-center justify-center text-lg font-bold">‹</button>
      <div><h1 class="text-xl font-black text-brand-900">Chiffrage</h1>
      <p class="text-sm text-slate-500">${S.projet?.nom}</p></div>
    </div>

    <div class="bg-brand-900 rounded-2xl p-5 text-white">
      <div class="grid grid-cols-2 gap-4">
        <div><div class="text-xs opacity-60 mb-1">Coût matière HT</div><div class="font-bold">${fcfa(totals.mat)}</div></div>
        <div><div class="text-xs opacity-60 mb-1">Prix vente HT</div><div class="font-bold" style="color:#F59E0B">${fcfa(totals.ht)}</div></div>
        <div><div class="text-xs opacity-60 mb-1">TVA ${Math.round(S.params.tva*100)}%</div><div class="font-bold">${fcfa(totals.tva)}</div></div>
        <div><div class="text-xs opacity-60 mb-1">TOTAL TTC</div><div class="font-black text-xl" style="color:#F59E0B">${fcfa(totals.ttc)}</div></div>
      </div>
    </div>

    ${S.fenetres.length===0?`<div class="text-center py-10 text-slate-400">Aucune fenêtre dans ce projet</div>`
    :S.fenetres.map((f,i)=>{
      const c=calcF(f)
      const open=S.expanded[f.id]
      return`
      <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-100">
        <button onclick="toggleExp('${f.id}')" class="w-full flex items-center gap-3 p-4 text-left">
          <div class="w-9 h-9 rounded-lg bg-brand-100 flex items-center justify-center font-bold text-brand-700 text-sm flex-shrink-0">${i+1}</div>
          <div class="flex-1 min-w-0">
            <div class="font-bold text-brand-900">${f.repere||'F'+String(i+1).padStart(2,'0')}</div>
            <div class="text-xs text-slate-500">${famLabel(f.famille)}${f.config?' · '+f.config:''} · ${f.largeur}×${f.hauteur} · ×${f.qty}</div>
          </div>
          <div class="text-right flex-shrink-0 mr-2">
            <div class="text-xs text-slate-400">Vente HT</div>
            <div class="font-bold text-brand-900 text-sm">${fcfa(c.htFCFA)}</div>
          </div>
          <span class="text-slate-400">${open?'▲':'▼'}</span>
        </button>
        ${open?`
        <div class="border-t border-slate-100 p-4 fade-in">
          <div class="bg-brand-900 rounded-xl p-4 text-white space-y-2">
            <div class="flex justify-between text-sm"><span class="opacity-60">Coût matière HT</span><span class="font-bold">${fcfa(c.matFCFA)}</span></div>
            <div class="flex justify-between text-sm"><span class="opacity-60">Marge ×${S.params.coeff_vente}</span><span class="font-bold">${fcfa(c.htFCFA)}</span></div>
            <div class="flex justify-between text-sm"><span class="opacity-60">TVA ${Math.round(S.params.tva*100)}%</span><span class="font-bold">${fcfa(c.tva)}</span></div>
            <div class="flex justify-between font-black border-t border-white/20 pt-2 mt-1">
              <span style="color:#F59E0B">Prix TTC</span><span style="color:#F59E0B">${fcfa(c.ttc)}</span>
            </div>
          </div>
        </div>`:''}
      </div>`
    }).join('')}
  </main>
  ${botnav('projets')}`
}

  S.expanded={...S.expanded,[id]:!S.expanded[id]};draw()
}

function pf(label,key,val,suffix,isPct=false){
  return`<div>
    <label class="text-xs font-semibold text-slate-500">${label}</label>
    <div class="relative mt-1">
      <input id="p_${key}" type="number" step="any" value="${val}"
        class="w-full px-3 py-2.5 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-brand-700 pr-20"/>
      <span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-slate-400 pointer-events-none">${suffix}</span>
    </div>
  </div>`
}
function pt(label,key,val){
  return`<div>
    <label class="text-xs font-semibold text-slate-500">${label}</label>
    <input id="p_${key}" type="text" value="${val||''}"
      class="w-full mt-1 px-3 py-2.5 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-brand-700"/>
  </div>`
}

async function saveParams(){
  const np={...S.params}
  ;['taux_euro','coeff_vente','frais_pose'].forEach(k=>{np[k]=+document.getElementById('p_'+k).value})
  ;['fret','douane','transit','tva'].forEach(k=>{np[k]=+document.getElementById('p_'+k).value/100})
  ;['societe_nom','societe_adresse','societe_tel','societe_email'].forEach(k=>{np[k]=document.getElementById('p_'+k).value})
  await sb.from('parametres').upsert({...np,user_id:S.user.id},{onConflict:'user_id'})
  set({params:np})
  toast('Paramètres enregistrés !')
}
